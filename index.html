<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Spark</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display&family=DM+Sans&display=swap" rel="stylesheet">

<style>
body {
  margin:0;
  font-family:'DM Sans', sans-serif;
  display:grid;
  grid-template-columns:1fr 1fr;
  height:100vh;
}

.left {
  background:#1a0f0f;
  color:white;
  padding:60px;
}

.left h1 {
  font-family:'Playfair Display', serif;
  font-size:60px;
}

.left p {
  opacity:0.6;
}

.right {
  display:flex;
  justify-content:center;
  align-items:center;
}

.box {
  width:320px;
}

input {
  width:100%;
  padding:12px;
  margin:8px 0;
  border-radius:8px;
  border:1px solid #ccc;
}

button {
  width:100%;
  padding:12px;
  background:#c9524a;
  color:white;
  border:none;
  border-radius:8px;
  cursor:pointer;
}

.error {
  color:red;
  margin-bottom:10px;
}
</style>
</head>

<body>

<div class="left">
<h1>Find your spark in minutes</h1>
<p>Real connections, curated matches, and live speed dating rooms, all in one place.</p>
</div>

<div class="right">
<div class="box">

<div id="error" class="error"></div>

<h3>Login</h3>
<form onsubmit="login(event)">
<input id="email" type="email" placeholder="Email">
<input id="password" type="password" placeholder="Password">
<button>Login</button>
</form>

<h3>Sign Up</h3>
<form onsubmit="signup(event)">
<input id="name" type="text" placeholder="Full Name">
<input id="email2" type="email" placeholder="Email">
<input id="password2" type="password" placeholder="Password">
<button>Create Account</button>
</form>

</div>
</div>

<script>
function error(msg){
  document.getElementById("error").innerText = msg;
}

window.login = (e)=>{
  e.preventDefault();

  const email = email.value.trim();
  const pass = password.value.trim();

  if(!email || !pass){
    error("Enter something bro");
    return;
  }

  localStorage.setItem("user", email);
  window.location = "app.html";
};

window.signup = (e)=>{
  e.preventDefault();

  const name = document.getElementById("name").value.trim();

  if(!name){
    error("At least put a name");
    return;
  }

  localStorage.setItem("user", name);
  window.location = "app.html";
};
</script>

</body>
</html>
