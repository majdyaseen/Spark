<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Spark</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display&family=DM+Sans&display=swap" rel="stylesheet">

<style>
body {
  margin:0;
  font-family:'DM Sans', sans-serif;
  display:grid;
  grid-template-columns:1fr 1fr;
  height:100vh;
}

.left {
  background:#1a0f0f;
  color:white;
  padding:60px;
}

.left h1 {
  font-family:'Playfair Display', serif;
  font-size:60px;
}

.left p {
  opacity:0.6;
}

.right {
  display:flex;
  justify-content:center;
  align-items:center;
}

.box {
  width:320px;
}

input {
  width:100%;
  padding:12px;
  margin:8px 0;
  border-radius:8px;
  border:1px solid #ccc;
}

button {
  width:100%;
  padding:12px;
  background:#c9524a;
  color:white;
  border:none;
  border-radius:8px;
  cursor:pointer;
}

.error {
  color:red;
  margin-bottom:10px;
}
</style>
</head>

<body>

<div class="left">
<h1>Find your spark in minutes</h1>
<p>Real connections, curated matches, and live speed dating rooms, all in one place.</p>
</div>

<div class="right">
<div class="box">

<div id="error" class="error"></div>

<h3>Login</h3>
<form onsubmit="login(event)">
<input id="email" type="email" placeholder="Email">
<input id="password" type="password" placeholder="Password">
<button>Login</button>
</form>

<h3>Sign Up</h3>
<form onsubmit="signup(event)">
<input id="name" type="text" placeholder="Full Name">
<input id="email2" type="email" placeholder="Email">
<input id="password2" type="password" placeholder="Password">
<button>Create Account</button>
</form>

</div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import {
  getAuth,
  signInWithEmailAndPassword,
  createUserWithEmailAndPassword,
  updateProfile
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyB6vXfEXAEvf3MHQQtUBswU-wNG0cCBsFQ",
  authDomain: "spark-b1dc2.firebaseapp.com",
  projectId: "spark-b1dc2"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

function error(msg){
  document.getElementById("error").innerText = msg;
}

function mapErr(code){
  return {
    "auth/user-not-found":"No account found",
    "auth/wrong-password":"Wrong password",
    "auth/email-already-in-use":"Email already used",
    "auth/invalid-email":"Invalid email",
    "auth/weak-password":"Weak password",
    "auth/configuration-not-found":"Enable Email/Password in Firebase"
  }[code] || code;
}

window.login = async(e)=>{
  e.preventDefault();
  try{
    await signInWithEmailAndPassword(auth,email.value,password.value);
    window.location="app.html";
  }catch(err){
    error(mapErr(err.code));
  }
};

window.signup = async(e)=>{
  e.preventDefault();
  try{
    const cred = await createUserWithEmailAndPassword(auth,email2.value,password2.value);
    await updateProfile(cred.user,{displayName:name.value});
    window.location="app.html";
  }catch(err){
    error(mapErr(err.code));
  }
};
</script>

</body>
</html>
