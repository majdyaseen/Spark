<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Spark — Speed Dating</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display&family=DM+Sans&display=swap" rel="stylesheet">

<style>
body { font-family: 'DM Sans', sans-serif; margin:0; display:flex; height:100vh; }
.left { flex:1; background:#1a0f0f; color:white; padding:60px; }
.right { flex:1; display:flex; justify-content:center; align-items:center; }

.auth-box { width:320px; }
input { width:100%; padding:10px; margin:10px 0; }
button { width:100%; padding:12px; background:#c9524a; color:white; border:none; cursor:pointer; }

.error { color:red; margin-bottom:10px; }
</style>
</head>

<body>

<div class="left">
<h1>Find your spark in minutes</h1>
<p>Real connections, curated matches, and live speed dating rooms, all in one place.</p>
</div>

<div class="right">
<div class="auth-box">

<div id="error" class="error"></div>

<h3>Login</h3>
<form onsubmit="handleLogin(event)">
<input type="email" id="loginEmail" placeholder="Email" required />
<input type="password" id="loginPassword" placeholder="Password" required />
<button>Login</button>
</form>

<h3>Sign Up</h3>
<form onsubmit="handleSignup(event)">
<input type="text" id="signupName" placeholder="Name" required />
<input type="email" id="signupEmail" placeholder="Email" required />
<input type="password" id="signupPassword" placeholder="Password" required />
<button>Create Account</button>
</form>

</div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import {
  getAuth,
  signInWithEmailAndPassword,
  createUserWithEmailAndPassword,
  updateProfile
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyB6vXfEXAEvf3MHQQtUBswU-wNG0cCBsFQ",
  authDomain: "spark-b1dc2.firebaseapp.com",
  projectId: "spark-b1dc2"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

function showError(msg){
  document.getElementById("error").innerText = msg;
}

function friendlyError(code){
  const map = {
    "auth/user-not-found":"No account found.",
    "auth/wrong-password":"Incorrect password.",
    "auth/email-already-in-use":"Email already exists.",
    "auth/invalid-email":"Invalid email.",
    "auth/weak-password":"Password must be at least 6 characters.",
    "auth/invalid-credential":"Invalid login credentials."
  };
  return map[code] || code;
}

window.handleLogin = async (e)=>{
  e.preventDefault();

  const email = loginEmail.value.trim();
  const pass = loginPassword.value.trim();

  if(!email || !pass){
    showError("Please fill all fields.");
    return;
  }

  try{
    await signInWithEmailAndPassword(auth,email,pass);
    window.location.href="app.html";
  }catch(err){
    showError(friendlyError(err.code));
  }
};

window.handleSignup = async (e)=>{
  e.preventDefault();

  const name = signupName.value.trim();
  const email = signupEmail.value.trim();
  const pass = signupPassword.value.trim();

  if(!name || !email || !pass){
    showError("Please fill all fields.");
    return;
  }

  try{
    const cred = await createUserWithEmailAndPassword(auth,email,pass);
    await updateProfile(cred.user,{displayName:name});
    window.location.href="app.html";
  }catch(err){
    showError(friendlyError(err.code));
  }
};
</script>

</body>
</html>
