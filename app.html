<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Spark App</title>

<style>
body {
  margin:0;
  font-family:sans-serif;
  display:flex;
}

.sidebar {
  width:220px;
  background:#1a0f0f;
  color:white;
  padding:20px;
  height:100vh;
}

.main {
  flex:1;
  padding:20px;
}

.card {
  border:1px solid #ddd;
  padding:15px;
  margin:10px 0;
  border-radius:10px;
}
</style>
</head>

<body>

<div class="sidebar">
<h2>Spark</h2>
<p id="userName"></p>
<button onclick="logout()">Logout</button>
</div>

<div class="main">
<h1>Discover</h1>

<div class="card">👩 Sarah, 22 - Loves coffee</div>
<div class="card">👨 Alex, 25 - Gym addict</div>
<div class="card">👩 Lina, 21 - Photography</div>

</div>

<script>
const user = localStorage.getItem("user");

if(!user){
  window.location = "index.html";
}

document.getElementById("userName").innerText = "Hi " + user;

function logout(){
  localStorage.removeItem("user");
  window.location = "index.html";
}
</script>

</body>
</html>
