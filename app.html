<!DOCTYPE html>
<html>
<head>
<link rel="stylesheet" href="style.css">
</head>

<body class="center">

<div class="card">
<h2 id="name"></h2>
<p id="bio"></p>

<button class="nope" onclick="skip()">Skip</button>
<button class="like" onclick="like()">Like</button>
</div>

<script type="module">
import { auth, db } from "./firebase.js";
import {
collection, getDocs, doc, updateDoc, arrayUnion
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

let users = [];
let current = 0;

const snap = await getDocs(collection(db,"users"));
snap.forEach(doc=> users.push({id:doc.id,...doc.data()}));

function show(){
  const u = users[current];
  document.getElementById("name").innerText = u.name;
  document.getElementById("bio").innerText = u.bio;
}

window.like = async ()=>{
  const target = users[current];

  await updateDoc(doc(db,"users",auth.currentUser.uid),{
    likes: arrayUnion(target.id)
  });

  alert("Liked!");
  next();
};

window.skip = ()=> next();

function next(){
  current++;
  if(current>=users.length) current=0;
  show();
}

show();
</script>

</body>
</html>
